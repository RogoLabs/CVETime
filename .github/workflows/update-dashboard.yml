name: Update CVE Summary and Deploy

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  refresh-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Fetch cvelistV5
        run: |
          mkdir -p .cache
          if [ -d .cache/cvelistV5/.git ]; then
            git -C .cache/cvelistV5 fetch --depth=1 origin main
            git -C .cache/cvelistV5 reset --hard origin/main
          else
            git clone --depth=1 https://github.com/CVEProject/cvelistV5.git .cache/cvelistV5
          fi

      - name: Build summary data and CNA pages
        run: |
          python scripts/build_summary.py \
            --cvelist-path .cache/cvelistV5 \
            --output docs/assets/data/summary.json \
            --cna-pages-dir docs/cna

      - name: Commit updated summary and CNA pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/assets/data/summary.json docs/cna/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update CVE summary and CNA pages"
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: refresh-data
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
